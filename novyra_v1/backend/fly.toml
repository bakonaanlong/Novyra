# fly.toml — Fly.io deployment config for the Smart Farm backend.
#
# Setup (run once from backend/):
#   fly launch --no-deploy        # creates the app, accept/edit this file
#   fly secrets set SMARTFARM_CORS_ORIGINS=https://your-frontend.example.com
#   fly secrets set ANTHROPIC_API_KEY=sk-ant-...   # optional, for nicer advice text
#   fly deploy

app = "smart-farm-backend"        # change to a globally-unique name
primary_region = "iad"            # pick the region closest to your users

[build]

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    timeout = "5s"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
